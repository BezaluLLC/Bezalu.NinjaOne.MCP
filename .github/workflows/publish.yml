name: Publish Container Image

on:
  push:
    branches: [main, dev]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ninjaone-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For releases: semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # For main branch: latest
            type=raw,value=latest,enable={{is_default_branch}}
            # For dev branch: dev tag
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # For dev branch with version: x.x.x-dev from release
            type=semver,pattern={{version}}-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # SHA for traceability
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          secrets: |
            nuget_auth<<EOF
            ${{ github.actor }}
            ${{ secrets.GITHUB_TOKEN }}
            EOF
